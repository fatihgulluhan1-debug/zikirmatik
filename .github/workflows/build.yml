name: Flutter Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Initialize Flutter Project
        run: |
          rm -rf pubspec.yaml
          flutter create . --project-name=zikirmatik --offline

      - name: Restore Custom Main
        run: |
          mkdir -p lib
          # Ana dizine yanlışlıkla yedeklenen dosyalar varsa temizle
          rm -f main.dart zikirmatik

      - name: Build AAB
        run: flutter build appbundle --release
